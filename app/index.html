<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1d21" />
  <title>Rhino AR Viewer</title>
  <style>
    :root {
      --bg: #1a1d21;
      --panel: #24282e;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #4c8bf5;
      --danger: #f28b82;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    #app { display: flex; flex-direction: column; height: 100%; }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: var(--panel);
    }
    header h1 { font-size: 1rem; font-weight: 600; }
    #status { font-size: 0.85rem; color: var(--muted); flex: 1; text-align: right; }
    #viewport { flex: 1; position: relative; min-height: 0; }
    #viewport canvas { display: block; width: 100%; height: 100%; }
    #controls {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 10px 14px; background: var(--panel);
    }
    select, button, .file-label {
      font: inherit; color: var(--text); background: #31363d;
      border: 1px solid #3f454d; border-radius: 8px;
      padding: 8px 14px; cursor: pointer;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-ar { background: var(--accent); border-color: var(--accent); font-weight: 600; }
    input[type="file"] { display: none; }
    .inline-control {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 0.85rem;
    }
    .inline-control input[type="range"] { width: 110px; accent-color: var(--accent); }
    input[type="color"] {
      width: 42px; height: 38px; padding: 2px; cursor: pointer;
      background: #31363d; border: 1px solid #3f454d; border-radius: 8px;
    }

    /* Busy spinner next to the status text */
    #spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #3f454d; border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    #spinner[hidden] { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* DOM overlay shown inside the AR session */
    #ar-overlay { display: none; }
    body.in-ar #ar-overlay {
      display: flex; position: fixed; inset: 0; pointer-events: none;
      flex-direction: column; justify-content: space-between;
      padding: max(12px, env(safe-area-inset-top)) 12px max(20px, env(safe-area-inset-bottom));
    }
    #ar-overlay .hint {
      align-self: center; background: rgba(0,0,0,0.55); color: #fff;
      padding: 8px 14px; border-radius: 999px; font-size: 0.9rem;
    }
    #ar-overlay .bottom {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    #ar-overlay button { pointer-events: auto; background: rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.25); }
    #ar-adjust {
      pointer-events: auto; display: flex; flex-direction: column; gap: 4px;
      background: rgba(0,0,0,0.55); border-radius: 12px; padding: 10px 14px;
      width: min(320px, 85vw); color: #fff; font-size: 0.85rem;
    }
    #ar-adjust label { display: flex; align-items: center; gap: 8px; }
    #ar-adjust label > span:first-child { width: 4.5em; }
    #ar-adjust label > span:last-child { width: 3.5em; text-align: right; font-variant-numeric: tabular-nums; }
    #ar-adjust input[type="range"] { flex: 1; accent-color: var(--accent); }
    .swatches { display: flex; gap: 10px; justify-content: center; padding-top: 4px; }
    .swatches button {
      width: 28px; height: 28px; border-radius: 50%; padding: 0;
      border: 2px solid rgba(255,255,255,0.65); cursor: pointer;
    }
    .swatches button.original {
      background: #24282e; color: #fff; font-size: 14px; line-height: 1;
    }
    body.in-ar #app { visibility: hidden; }

    /* Desktop panel: QR code with the LAN URL for the phone */
    #qr-panel {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: var(--panel); border: 1px solid #3f454d; border-radius: 12px;
      padding: 12px; font-size: 0.78rem; color: var(--muted); text-align: center;
    }
    #qr-panel[hidden] { display: none; }
    #qr-panel canvas { border-radius: 6px; }
    #qr-panel code { color: var(--text); word-break: break-all; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Rhino AR Viewer</h1>
      <div id="status">Initialisiere …</div>
      <span id="spinner" hidden></span>
    </header>
    <div id="viewport">
      <div id="qr-panel" hidden>
        <canvas id="qr-canvas"></canvas>
        <span>Am Handy scannen:</span>
        <code id="qr-url"></code>
      </div>
    </div>
    <div id="controls">
      <select id="model-select" aria-label="Modell wählen">
        <option value="cube">Testwürfel (0,4 m)</option>
        <option value="sample-3dm">Beispiel-Box (.3dm)</option>
      </select>
      <label class="file-label" for="file-input">Datei öffnen (.3dm / .glb)</label>
      <input id="file-input" type="file" accept=".3dm,.glb,.gltf" />
      <label class="inline-control">
        <span>Deckkraft</span>
        <input id="opacity-slider" type="range" min="10" max="100" step="5" value="100" />
      </label>
      <input id="color-picker" type="color" value="#4c8bf5" title="Materialfarbe wählen" />
      <button id="btn-color-reset" title="Originalfarben wiederherstellen">Original</button>
      <button id="btn-ar" disabled>AR starten</button>
    </div>
  </div>

  <div id="ar-overlay">
    <div class="hint" id="ar-hint">Bewege das Handy langsam, bis der Ring erscheint – dann tippen.</div>
    <div class="bottom">
      <div id="ar-adjust" hidden>
        <label>
          <span>Grösse</span>
          <input id="scale-slider" type="range" min="1" max="200" step="1" value="100" />
          <span id="scale-value">100 %</span>
        </label>
        <label>
          <span>Drehung</span>
          <input id="rotate-slider" type="range" min="0" max="360" step="1" value="0" />
          <span id="rotate-value">0°</span>
        </label>
        <label>
          <span>Deckkraft</span>
          <input id="ar-opacity-slider" type="range" min="10" max="100" step="5" value="100" />
          <span id="ar-opacity-value">100 %</span>
        </label>
        <div class="swatches" id="ar-swatches">
          <button type="button" class="original" data-color="" title="Originalfarben">⟲</button>
          <button type="button" data-color="#e8eaed" style="background:#e8eaed" title="Weiss"></button>
          <button type="button" data-color="#4c8bf5" style="background:#4c8bf5" title="Blau"></button>
          <button type="button" data-color="#34a853" style="background:#34a853" title="Grün"></button>
          <button type="button" data-color="#fbbc04" style="background:#fbbc04" title="Gelb"></button>
          <button type="button" data-color="#ea4335" style="background:#ea4335" title="Rot"></button>
        </div>
      </div>
      <button id="btn-exit-ar">AR beenden</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
